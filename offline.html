<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sin conexión — Thanotectas</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Jost',system-ui,sans-serif;background:#1a1611;color:#f0e6d3;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
h1{font-size:3rem;margin-bottom:1rem}
h2{font-size:1.3rem;font-weight:300;color:#c4973b;margin-bottom:1rem}
p{font-size:.9rem;color:rgba(240,230,211,.6);line-height:1.7;max-width:400px;margin:0 auto 2rem}
button{background:linear-gradient(135deg,#2d4a2e,#3d6a3e);color:#f0e6d3;border:none;padding:.8rem 2rem;border-radius:8px;font-size:.9rem;cursor:pointer;font-family:'Jost',sans-serif}
button:hover{filter:brightness(1.1)}
</style>
</head>
<body>
<div>
<h1>🌍</h1>
<h2>Sin conexión</h2>
<p>Parece que no tienes conexión a internet. El Oráculo necesita estar conectado para inscribir memorias ecológicas.</p>
<button onclick="location.reload()">Reintentar</button>
</div>
</body>
</html>
