<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d130c">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>Mi Panel — Thanotectas · Archivo del Umbral</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Manrope:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --noche:#0d130c;
  --noche-2:#141d12;
  --noche-3:#1c2719;
  --bosque:#1f3a25;
  --bosque-claro:#2d5237;
  --musgo:#4a8a4b;
  --musgo-glow:#6cc06d;
  --oro:#d4a547;
  --oro-claro:#e5c068;
  --oro-glow:#f4d989;
  --crema:#f0e6d3;
  --crema-50:rgba(240,230,211,.5);
  --crema-30:rgba(240,230,211,.3);
  --linea:rgba(212,165,71,.18);
  --linea-2:rgba(212,165,71,.35);
  --rojo:#c47050;
  --azul:#5a9ec8;
  --lila:#8b7ec8;
  --coral:#d08060;
  --rosa:#c87a9a;
  --serif:'Fraunces',Georgia,serif;
  --sans:'Manrope',system-ui,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
::selection{background:var(--oro);color:var(--noche)}
body{
  font-family:var(--sans);
  background:var(--noche);
  color:var(--crema);
  min-height:100vh;
  font-weight:300;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(74,138,75,.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(212,165,71,.04) 0%, transparent 50%);
}

/* === NAV === */
.nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.8rem;
  background:rgba(13,19,12,.92);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--linea);
}
.nav-logo{
  font-family:var(--serif);
  font-size:1.05rem;
  font-weight:500;
  color:var(--oro);
  text-decoration:none;
  letter-spacing:.18em;
  text-transform:uppercase;
  display:flex;align-items:center;gap:.7rem;
}
.nav-logo svg{width:30px;height:30px;filter:drop-shadow(0 0 8px rgba(212,165,71,.3))}
.nav-links{display:flex;gap:.5rem;align-items:center}
.nav-links a{
  font-family:var(--mono);
  font-size:.65rem;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--crema-50);
  text-decoration:none;
  padding:.55rem 1rem;
  border-radius:2px;
  transition:all .25s;
}
.nav-links a:hover{color:var(--crema);background:rgba(240,230,211,.04)}
.nav-links a.on{
  color:var(--oro);
  background:rgba(212,165,71,.08);
  border:1px solid var(--linea);
}
.nav-links .btn-new{
  background:linear-gradient(135deg, var(--oro), var(--oro-claro));
  color:var(--noche);
  font-weight:600;
  padding:.55rem 1.2rem;
  border-radius:2px;
  letter-spacing:.18em;
}
.nav-links .btn-new:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(212,165,71,.3)}

.wrap{max-width:920px;margin:0 auto;padding:2.5rem 1.5rem 5rem;position:relative;z-index:2}

.loading{text-align:center;padding:6rem 1.5rem;color:var(--crema-50)}
.loading h2{
  font-family:var(--serif);
  font-style:italic;
  font-size:1.6rem;
  font-weight:400;
  color:var(--oro);
  margin-bottom:.6rem;
}
.spinner{
  width:34px;height:34px;
  border:1px solid var(--linea);
  border-top-color:var(--oro);
  border-radius:50%;
  animation:sp 1s linear infinite;
  margin:0 auto 1.2rem;
  filter:drop-shadow(0 0 6px rgba(244,217,137,.3));
}
@keyframes sp{to{transform:rotate(360deg)}}

/* === WELCOME === */
.welcome{margin-bottom:2.5rem}
.welcome .pretitle{
  font-family:var(--mono);
  font-size:.65rem;
  letter-spacing:.32em;
  text-transform:uppercase;
  color:var(--oro);
  margin-bottom:.7rem;
  display:flex;align-items:center;gap:.7rem;
}
.welcome .pretitle::before{content:'';width:18px;height:1px;background:var(--oro)}
.welcome h1{
  font-family:var(--serif);
  font-size:2.4rem;
  font-weight:300;
  letter-spacing:-0.012em;
  line-height:1.1;
  margin-bottom:.5rem;
}
.welcome h1 em{
  font-style:italic;
  color:var(--oro-claro);
  font-weight:400;
}
.welcome p{
  font-family:var(--serif);
  font-style:italic;
  font-size:1rem;
  color:var(--crema-50);
  line-height:1.65;
}

/* === PROFILE === */
.prof{
  display:flex;align-items:center;gap:1.2rem;
  padding:1.4rem 1.6rem;
  background:rgba(240,230,211,.04);
  border:1px solid var(--linea);
  border-radius:2px;
  margin-bottom:1.5rem;
  position:relative;
  overflow:hidden;
}
.prof::before{
  content:'';
  position:absolute;
  top:-1px;left:0;right:0;height:2px;
  background:linear-gradient(90deg, transparent, var(--oro), transparent);
}
.prof-av{
  width:54px;height:54px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
  flex-shrink:0;
  background:rgba(212,165,71,.1);
  border:1px solid var(--linea-2);
}
.prof-info{flex:1;min-width:0}
.prof-name{
  font-family:var(--serif);
  font-size:1.15rem;
  font-weight:500;
  display:flex;align-items:center;gap:.6rem;
  flex-wrap:wrap;
  letter-spacing:-0.005em;
}
.prof-email{
  font-family:var(--mono);
  font-size:.68rem;
  color:var(--crema-50);
  letter-spacing:.05em;
  margin-top:.2rem;
}
.badge{
  font-family:var(--mono);
  font-size:.55rem;
  padding:.18rem .65rem;
  font-weight:500;
  letter-spacing:.22em;
  text-transform:uppercase;
}
.badge-gratis{background:rgba(74,138,75,.15);color:var(--musgo-glow)}
.badge-explorador{background:rgba(90,158,200,.12);color:var(--azul)}
.badge-guardian{background:rgba(212,165,71,.12);color:var(--oro)}
.badge-eterno{
  background:linear-gradient(135deg, rgba(212,165,71,.25), rgba(244,217,137,.18));
  color:var(--oro-glow);
  border:1px solid var(--linea-2);
}
.badge-admin{background:rgba(139,126,200,.12);color:var(--lila)}
.plan-status{
  font-family:var(--serif);
  font-style:italic;
  font-size:.85rem;
  color:var(--crema-50);
  margin-top:.45rem;
  line-height:1.5;
}
.plan-status strong{color:var(--oro);font-style:normal;font-weight:500}
.plan-status a{color:var(--oro);text-decoration:none;font-weight:500;font-style:normal}
.prof-actions{display:flex;gap:.4rem;flex-shrink:0;flex-wrap:wrap}
.prof-btn{
  font-family:var(--mono);
  font-size:.62rem;
  color:var(--oro);
  padding:.5rem .9rem;
  border:1px solid var(--linea);
  border-radius:2px;
  cursor:pointer;
  background:none;
  letter-spacing:.18em;
  text-transform:uppercase;
  transition:all .25s;
  text-decoration:none;
}
.prof-btn:hover{background:rgba(212,165,71,.08);border-color:var(--linea-2)}

/* === PERFIL PÚBLICO CARD === */
.publicprofile{
  background:linear-gradient(135deg, rgba(212,165,71,.08), rgba(212,165,71,.03));
  border:1px solid var(--linea-2);
  border-radius:2px;
  padding:1.2rem 1.5rem;
  margin-bottom:1.5rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:1rem;
  flex-wrap:wrap;
}
.publicprofile-info{flex:1;min-width:0}
.publicprofile-label{
  font-family:var(--mono);
  font-size:.6rem;
  letter-spacing:.32em;
  text-transform:uppercase;
  color:var(--oro);
  margin-bottom:.4rem;
}
.publicprofile-url{
  font-family:var(--mono);
  font-size:.85rem;
  color:var(--crema);
  word-break:break-all;
  letter-spacing:.05em;
}
.publicprofile-btn{
  font-family:var(--mono);
  font-size:.62rem;
  letter-spacing:.22em;
  text-transform:uppercase;
  padding:.55rem 1rem;
  background:rgba(212,165,71,.1);
  color:var(--oro);
  border:1px solid var(--linea-2);
  border-radius:2px;
  cursor:pointer;
  text-decoration:none;
  white-space:nowrap;
  transition:all .25s;
}
.publicprofile-btn:hover{background:rgba(212,165,71,.2);border-color:var(--oro)}

/* === QUICK ACCESS === */
.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;margin-bottom:2rem;background:var(--linea);border:1px solid var(--linea)}
.quick a, .quick div{
  display:flex;flex-direction:column;align-items:center;
  gap:.6rem;
  padding:1.4rem .5rem;
  background:var(--noche-2);
  cursor:pointer;
  transition:all .25s;
  text-decoration:none;
  color:var(--crema);
  border:none;
}
.quick a:hover, .quick div:hover{background:var(--noche-3)}
.quick .qi{
  font-family:var(--serif);
  font-style:italic;
  font-size:1.7rem;
  color:var(--oro);
  font-weight:300;
  font-variation-settings:"opsz" 144;
}
.quick .ql{
  font-family:var(--mono);
  font-size:.6rem;
  letter-spacing:.22em;
  text-transform:uppercase;
  text-align:center;
  color:var(--crema-50);
}
.quick a:hover .ql, .quick div:hover .ql{color:var(--oro)}

/* === STATS === */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;margin-bottom:2.5rem;background:var(--linea);border:1px solid var(--linea)}
.stat{
  background:var(--noche-2);
  padding:1.3rem 1rem;
  text-align:center;
}
.stat-n{
  font-family:var(--serif);
  font-size:2.4rem;
  font-weight:300;
  line-height:1;
  font-variation-settings:"opsz" 144;
}
.stat-n.c1{color:var(--musgo-glow)}
.stat-n.c2{color:var(--oro)}
.stat-n.c3{color:var(--azul)}
.stat-n.c4{color:var(--coral)}
.stat-l{
  font-family:var(--mono);
  font-size:.58rem;
  color:var(--crema-50);
  margin-top:.5rem;
  letter-spacing:.28em;
  text-transform:uppercase;
}

/* === SECTION HEADER === */
.sec-h{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1.2rem;
  flex-wrap:wrap;gap:.8rem;
  padding-bottom:.8rem;
  border-bottom:1px solid var(--linea);
}
.sec-h h2{
  font-family:var(--serif);
  font-size:1.7rem;
  font-weight:300;
  letter-spacing:-0.005em;
}
.sec-h h2 em{font-style:italic;color:var(--oro-claro);font-weight:400}

/* === FILTERS === */
.filters{display:flex;gap:.4rem;flex-wrap:wrap}
.fbtn{
  font-family:var(--mono);
  font-size:.6rem;
  padding:.45rem .9rem;
  border:1px solid var(--linea);
  color:var(--crema-50);
  cursor:pointer;
  background:none;
  letter-spacing:.18em;
  text-transform:uppercase;
  transition:all .2s;
  border-radius:2px;
}
.fbtn:hover{border-color:var(--linea-2);color:var(--crema)}
.fbtn.on{
  background:rgba(212,165,71,.1);
  color:var(--oro);
  border-color:var(--linea-2);
}

/* === CAPSULAS === */
.caps{display:flex;flex-direction:column;gap:1px;margin-bottom:2.5rem;background:var(--linea);border:1px solid var(--linea)}
.cap{
  background:var(--noche-2);
  cursor:pointer;
  transition:background .25s;
  overflow:hidden;
}
.cap:hover{background:var(--noche-3)}
.cap-inner{
  display:flex;
  padding:1.3rem 1.5rem;
  gap:1.1rem;
  align-items:flex-start;
}
.cap-icon{
  width:42px;height:42px;
  border-radius:2px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  flex-shrink:0;
  border:1px solid;
}
.cap-icon.t-poema{background:rgba(139,126,200,.1);border-color:rgba(139,126,200,.25)}
.cap-icon.t-dato{background:rgba(90,158,200,.08);border-color:rgba(90,158,200,.25)}
.cap-icon.t-carta{background:rgba(90,158,200,.08);border-color:rgba(90,158,200,.25)}
.cap-icon.t-obituario{background:rgba(208,128,96,.08);border-color:rgba(208,128,96,.25)}
.cap-icon.t-alerta{background:rgba(212,165,71,.08);border-color:var(--linea-2)}
.cap-icon.t-ritual{background:rgba(200,122,154,.08);border-color:rgba(200,122,154,.25)}
.cap-body{flex:1;min-width:0}
.cap-subj{
  font-family:var(--serif);
  font-size:1.25rem;
  font-weight:500;
  margin-bottom:.4rem;
  letter-spacing:-0.005em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.cap-meta{
  display:flex;gap:.5rem;align-items:center;
  margin-bottom:.55rem;
  flex-wrap:wrap;
}
.cap-tag{
  font-family:var(--mono);
  font-size:.52rem;
  padding:.15rem .55rem;
  font-weight:500;
  letter-spacing:.22em;
  text-transform:uppercase;
}
.cap-tag.tipo{background:rgba(139,126,200,.12);color:var(--lila)}
.cap-tag.idioma{background:rgba(74,138,75,.12);color:var(--musgo-glow)}
.cap-tag.cert{background:rgba(212,165,71,.1);color:var(--oro);letter-spacing:.18em}
.cap-tag.publica{background:rgba(74,138,75,.18);color:var(--musgo-glow)}
.cap-date{
  font-family:var(--mono);
  font-size:.58rem;
  color:var(--crema-50);
  letter-spacing:.15em;
  text-transform:uppercase;
}
.cap-preview{
  font-family:var(--serif);
  font-style:italic;
  font-size:.95rem;
  color:var(--crema-50);
  line-height:1.6;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.cap-exp{display:none;padding:0 1.5rem 1.5rem;border-top:1px solid var(--linea)}
.cap-exp.open{display:block;padding-top:1.2rem}
.cap-full{
  font-family:var(--serif);
  font-style:italic;
  font-size:1.05rem;
  font-weight:300;
  line-height:1.85;
  white-space:pre-wrap;
  margin-bottom:1.3rem;
  color:var(--crema);
}
.cap-actions-primary{
  display:flex;gap:.5rem;flex-wrap:wrap;
  padding-bottom:1rem;
  margin-bottom:1rem;
  border-bottom:1px dashed var(--linea);
}
.act-btn{
  font-family:var(--mono);
  font-size:.62rem;
  padding:.6rem 1.1rem;
  border-radius:2px;
  cursor:pointer;
  letter-spacing:.2em;
  text-transform:uppercase;
  transition:all .25s;
  display:inline-flex;
  align-items:center;
  gap:.45rem;
  text-decoration:none;
  border:1px solid;
}
.act-cert{
  background:linear-gradient(135deg, var(--oro), var(--oro-claro));
  color:var(--noche);
  border-color:var(--oro);
  font-weight:600;
}
.act-cert:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(212,165,71,.35)}
.act-toggle{
  background:rgba(74,138,75,.08);
  color:var(--musgo-glow);
  border-color:rgba(74,138,75,.3);
}
.act-toggle:hover{background:rgba(74,138,75,.15)}
.act-toggle.active{background:rgba(74,138,75,.22);border-color:var(--musgo-glow)}
.act-toggle.locked{opacity:.55;cursor:not-allowed;background:rgba(240,230,211,.03);color:var(--crema-50);border-color:var(--linea)}
.act-share-public{
  background:rgba(90,158,200,.08);
  color:var(--azul);
  border-color:rgba(90,158,200,.3);
}
.act-share-public:hover{background:rgba(90,158,200,.18)}

.share-row{display:flex;gap:.4rem;flex-wrap:wrap}
.shr{
  font-family:var(--mono);
  font-size:.6rem;
  padding:.5rem .9rem;
  border:1px solid var(--linea);
  background:rgba(212,165,71,.04);
  color:var(--oro);
  cursor:pointer;
  letter-spacing:.18em;
  text-transform:uppercase;
  transition:all .2s;
  display:flex;align-items:center;gap:.35rem;
  border-radius:2px;
}
.shr:hover{background:rgba(212,165,71,.12);border-color:var(--linea-2)}
.shr svg{width:11px;height:11px}

/* === REFERIDOS === */
.ref{
  background:linear-gradient(135deg, rgba(74,138,75,.06), rgba(212,165,71,.04));
  border:1px solid var(--linea);
  border-radius:2px;
  padding:1.5rem 1.8rem;
  margin-bottom:2rem;
}
.ref-head{display:flex;align-items:center;gap:.8rem;margin-bottom:1rem}
.ref-head .icon{
  font-family:var(--serif);
  font-style:italic;
  font-size:1.6rem;
  color:var(--oro);
  font-variation-settings:"opsz" 144;
}
.ref-head h3{
  font-family:var(--serif);
  font-size:1.2rem;
  font-weight:500;
  letter-spacing:-0.005em;
}
.ref h3 em{color:var(--oro-claro);font-style:italic}
.ref p{
  font-family:var(--serif);
  font-style:italic;
  font-size:.95rem;
  color:var(--crema-50);
  margin-bottom:1.1rem;
  line-height:1.6;
}
.ref strong{color:var(--oro);font-style:normal;font-weight:500}
.ref-row{display:flex;gap:.5rem;margin-bottom:.8rem}
.ref-in{
  flex:1;
  background:rgba(13,11,8,.6);
  border:1px solid var(--linea);
  color:var(--crema);
  padding:.7rem 1rem;
  border-radius:2px;
  font-family:var(--mono);
  font-size:.78rem;
  letter-spacing:.05em;
}
.ref-in:focus{outline:none;border-color:var(--oro)}
.ref-btn{
  background:rgba(212,165,71,.1);
  color:var(--oro);
  border:1px solid var(--linea-2);
  padding:.7rem 1.2rem;
  border-radius:2px;
  cursor:pointer;
  font-family:var(--mono);
  font-size:.62rem;
  font-weight:500;
  letter-spacing:.22em;
  text-transform:uppercase;
  transition:all .25s;
  white-space:nowrap;
}
.ref-btn:hover{background:rgba(212,165,71,.2);border-color:var(--oro)}
.ref-stats{
  font-family:var(--mono);
  font-size:.65rem;
  color:var(--crema-50);
  display:flex;gap:1.5rem;
  letter-spacing:.18em;
  text-transform:uppercase;
}
.ref-stats strong{color:var(--oro);font-weight:500}

/* === EMPTY === */
.empty{
  text-align:center;
  padding:3.5rem 1.5rem;
  background:rgba(240,230,211,.03);
  border:1px dashed var(--linea-2);
  border-radius:2px;
}
.empty .ei{
  font-family:var(--serif);
  font-style:italic;
  font-size:3rem;
  color:var(--oro);
  margin-bottom:1rem;
  font-variation-settings:"opsz" 144;
}
.empty h3{
  font-family:var(--serif);
  font-size:1.4rem;
  font-weight:400;
  margin-bottom:.6rem;
  letter-spacing:-0.005em;
}
.empty p{
  font-family:var(--serif);
  font-style:italic;
  font-size:.95rem;
  color:var(--crema-50);
  margin-bottom:1.5rem;
  line-height:1.6;
}
.empty .btn-go{
  display:inline-flex;
  align-items:center;
  gap:.5rem;
  padding:.85rem 2rem;
  background:linear-gradient(135deg, var(--oro), var(--oro-claro));
  color:var(--noche);
  border-radius:2px;
  text-decoration:none;
  font-family:var(--sans);
  font-size:.78rem;
  font-weight:600;
  letter-spacing:.2em;
  text-transform:uppercase;
  transition:all .35s;
}
.empty .btn-go:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(212,165,71,.4)}

/* === TOAST === */
.toast{
  position:fixed;
  bottom:1.8rem;left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--oro);
  color:var(--noche);
  padding:.85rem 1.8rem;

<script>
var SB_URL='https://oygwnmfwfxbxdogaqwmi.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95Z3dubWZ3ZnhieGRvZ2Fxd21pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1Njc3NzEsImV4cCI6MjA5MTE0Mzc3MX0.RqnATwitqlTWThw27qw4Z2TlHiQBEVpvsKfbBe0kJ8I';
var noopLock=function(_name,_timeout,fn){return fn();};
var sb=window.supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:false,lock:noopLock}});
var CU=null,UP=null,caps=[],filt='todas';
var TM={poema:{icon:'📜',css:'t-poema',lb:'Poema'},dato:{icon:'🔬',css:'t-dato',lb:'Dato'},carta:{icon:'✉️',css:'t-carta',lb:'Carta'},obituario:{icon:'🕯️',css:'t-obituario',lb:'Obituario'},alerta:{icon:'⚠️',css:'t-alerta',lb:'Alerta'},ritual:{icon:'🙏',css:'t-ritual',lb:'Ritual'}};
var PM={gratis:{e:'🌱',lb:'Gratis',mx:3},explorador:{e:'🌿',lb:'Explorador',mx:10},guardian:{e:'🛡️',lb:'Guardián',mx:20},eterno:{e:'✦',lb:'Eterno',mx:999999},admin:{e:'⚡',lb:'Admin',mx:999999}};

async function init(){
  try{
    var r=await sb.auth.getSession();
    if(!r.data.session){sh('v-auth');return;}
    CU=r.data.session.user;

    async function fetchPerfil(){
      var sess=await sb.auth.getSession();
      var token=sess.data&&sess.data.session?sess.data.session.access_token:null;
      if(!token)return null;
      var ctrl=new AbortController();
      var tid=setTimeout(function(){ctrl.abort();},4500);
      try{
        var res=await fetch(SB_URL+'/rest/v1/rpc/obtener_mi_perfil',{
          method:'POST',
          headers:{'apikey':SB_KEY,'Authorization':'Bearer '+token,'Content-Type':'application/json','Accept':'application/json'},
          body:'{}',
          signal:ctrl.signal
        });
        clearTimeout(tid);
        if(!res.ok){console.warn('[panel fetch] HTTP',res.status);return null;}
        var data=await res.json();
        return (data&&data.length>0)?data[0]:null;
      }catch(e){
        clearTimeout(tid);
        if(e.name==='AbortError')throw new Error('TIMEOUT');
        throw e;
      }
    }

    var perfil;
    try{
      perfil=await fetchPerfil();
    }catch(e){
      console.warn('[panel] Primer fetch timeout, refresh + retry...');
      try{await sb.auth.refreshSession();perfil=await fetchPerfil();}
      catch(e2){console.error('[panel] Recovery falló:',e2);sh('v-auth');return;}
    }

    if(!perfil){await wt(1500);try{perfil=await fetchPerfil();}catch(e){}}
    if(!perfil){sh('v-auth');return;}
    if(!perfil.email&&CU.email) perfil.email=CU.email;
    UP=perfil;

    var c=await sb.from('capsulas').select('*').eq('guardian_id',UP.id).order('created_at',{ascending:false});
    caps=c.data||[];
    render();
  }catch(e){console.error(e);sh('v-auth');}
}
function sh(id){document.getElementById('v-load').style.display='none';document.getElementById('v-auth').style.display=id==='v-auth'?'':'none';document.getElementById('v-panel').style.display=id==='v-panel'?'':'none';}
function wt(ms){return new Promise(function(ok){setTimeout(ok,ms)});}

function planStatusText(){
  if(UP.es_admin) return '✦ <strong>Administrador</strong> · acceso ilimitado';
  if(UP.plan==='eterno') return '✦ <strong>Guardián Eterno</strong> · membresía vitalicia';
  if(UP.plan==='guardian'&&UP.plan_vence_en){
    var d=Math.max(0,Math.ceil((new Date(UP.plan_vence_en)-new Date())/86400000));
    return '<strong>Membresía Guardián activa</strong> · '+d+' días restantes';
  }
  if(UP.plan==='guardian') return '<strong>Guardián</strong> · membresía activa';
  if(UP.plan==='explorador') return 'Plan <strong>Explorador</strong>';
  return 'Plan <strong>Visitante</strong> · <a href="#" onclick="goTo(\'/oraculo.html\');return false">hacerse Guardián →</a>';
}

function render(){sh('v-panel');
var plan=UP.plan||'gratis',pc=PM[plan]||PM.gratis,name=UP.nombre||CU.email.split('@')[0],av=UP.avatar||pc.e,cred=UP.consultas_disponibles||0;
var h=new Date().getHours(),g=h<12?'Buenos días':h<18?'Buenas tardes':'Buenas noches';
document.getElementById('welcome').innerHTML='<div class="pretitle">Mi Panel</div><h1>'+g+', <em>'+esc(name)+'</em></h1><p>Tu archivo personal de memorias en el Umbral.</p>';

document.getElementById('prof').innerHTML='<div class="prof-av">'+av+'</div><div class="prof-info"><div class="prof-name">'+esc(name)+' <span class="badge badge-'+plan+'">'+pc.lb+'</span></div><div class="prof-email">'+esc(CU.email)+'</div><div class="plan-status">'+planStatusText()+'</div></div><div class="prof-actions"><a class="prof-btn" href="#" onclick="goTo(\'/cuenta.html\');return false">⚙ Cuenta</a></div>';

if(UP.slug && UP.perfil_publico){
  var publicUrl='https://thanotectas.com/g/'+UP.slug;
  document.getElementById('publicprofile').style.display='flex';
  document.getElementById('publicprofile').innerHTML='<div class="publicprofile-info"><div class="publicprofile-label">✦ Tu perfil público</div><div class="publicprofile-url">'+publicUrl+'</div></div><a class="publicprofile-btn" href="/g/'+UP.slug+'" target="_blank">Ver perfil</a><button class="publicprofile-btn" onclick="copyPublic(\''+publicUrl+'\')">Copiar link</button>';
}

var tipos={};caps.forEach(function(c){tipos[c.tipo]=1;});
var publicas=caps.filter(function(c){return c.es_publica;}).length;
document.getElementById('stats').innerHTML='<div class="stat"><div class="stat-n c1">'+caps.length+'</div><div class="stat-l">Cápsulas</div></div><div class="stat"><div class="stat-n c2">'+publicas+'</div><div class="stat-l">Públicas</div></div><div class="stat"><div class="stat-n c3">'+Object.keys(tipos).length+'</div><div class="stat-l">Tipos</div></div><div class="stat"><div class="stat-n c4">'+(UP.es_admin?'∞':cred)+'</div><div class="stat-l">Créditos</div></div>';

var code=UP.codigo_referido||CU.id.substring(0,8).toUpperCase(),link='https://thanotectas.com/bienvenida.html?ref='+code,ex=UP.referidos_exitosos||0;
document.getElementById('ref-card').innerHTML='<div class="ref-head"><span class="icon">❦</span><h3>Invita y gana <em>2 cápsulas</em> gratis</h3></div><p>Comparte tu enlace. Cuando alguien se registre, <strong>ambos reciben 2 inscripciones extra</strong>.</p><div class="ref-row"><input class="ref-in" id="ref-link" value="'+link+'" readonly onclick="this.select()"><button class="ref-btn" onclick="copyRef()">Copiar</button><button class="ref-btn" onclick="shareRefLink()">Compartir</button></div><div class="ref-stats"><span>Referidos · <strong>'+ex+'</strong></span><span>Ganadas · <strong>'+(ex*2)+'</strong></span></div>';

renderFilters();renderCaps();}

function renderFilters(){var ts=[],seen={};caps.forEach(function(c){if(!seen[c.tipo]){seen[c.tipo]=1;ts.push(c.tipo);}});var h='<button class="fbtn '+(filt==='todas'?'on':'')+'" onclick="setF(\'todas\')">Todas</button><button class="fbtn '+(filt==='publicas'?'on':'')+'" onclick="setF(\'publicas\')">✦ Públicas</button>';ts.forEach(function(t){var tc=TM[t]||{lb:t};h+='<button class="fbtn '+(filt===t?'on':'')+'" onclick="setF(\''+t+'\')">'+tc.lb+'</button>';});document.getElementById('filters').innerHTML=h;}

function renderCaps(){
var list;
if(filt==='todas') list=caps;
else if(filt==='publicas') list=caps.filter(function(c){return c.es_publica;});
else list=caps.filter(function(c){return c.tipo===filt;});

var el=document.getElementById('caps');
if(list.length===0){el.innerHTML='<div class="empty"><div class="ei">❦</div><h3>'+(caps.length===0?'Aún no tienes cápsulas':'Sin cápsulas en este filtro')+'</h3><p>'+(caps.length===0?'Visita el Oráculo para inscribir tu primera memoria.':'Prueba otro filtro.')+'</p><a class="btn-go" href="#" onclick="goTo(\'/oraculo.html\');return false">Ir al Oráculo</a></div>';return;}

el.innerHTML=list.map(function(c,i){
var tc=TM[c.tipo]||{icon:'📝',css:'t-poema',lb:c.tipo};
var f=new Date(c.created_at).toLocaleDateString('es-CO',{day:'numeric',month:'short',year:'numeric'});
var pv=(c.contenido||'').substring(0,200);
var puedeHacerPublica=(UP.plan==='guardian'||UP.plan==='eterno'||UP.es_admin);
var toggleLabel=c.es_publica?'✓ Pública en el Archivo':(puedeHacerPublica?'🔒 Hacer pública':'🔒 Requiere Guardián');
var toggleClass=c.es_publica?'act-toggle active':(puedeHacerPublica?'act-toggle':'act-toggle locked');
var publicLink=c.es_publica&&c.numero_certificado?'https://thanotectas.com/certificado.html?n='+c.numero_certificado:'';
var tieneFotoPropia = c.imagen_url && /supabase\.co\/storage\/.*capsulas-imagenes/.test(c.imagen_url);
var iconoHtml = tieneFotoPropia
  ? '<div class="cap-icon" style="background-image:url(\''+esc(c.imagen_url)+'\');background-size:cover;background-position:center;border-color:var(--linea-2)"></div>'
  : '<div class="cap-icon '+tc.css+'">'+tc.icon+'</div>';
var fotoExpandHtml = tieneFotoPropia
  ? '<figure style="margin:0 0 1.3rem;text-align:center"><img src="'+esc(c.imagen_url)+'" alt="'+esc(c.sujeto||'')+'" loading="lazy" style="max-width:100%;max-height:400px;border:1px solid var(--linea);border-radius:2px;display:inline-block"/></figure>'
  : '';

return '<div class="cap"><div class="cap-inner" onclick="togCap('+i+')">'+iconoHtml+'<div class="cap-body"><div class="cap-subj">'+esc(c.sujeto||'Sin título')+'</div><div class="cap-meta">'+(c.numero_certificado?'<span class="cap-tag cert">'+esc(c.numero_certificado)+'</span>':'')+'<span class="cap-tag tipo">'+tc.lb+'</span><span class="cap-tag idioma">'+(c.idioma||'ES').toUpperCase()+'</span>'+(c.es_publica?'<span class="cap-tag publica">✦ Pública</span>':'')+(tieneFotoPropia?'<span class="cap-tag tipo" style="background:rgba(74,138,75,.12);color:var(--musgo-glow)">📷 Con foto</span>':'')+'<span class="cap-date">'+f+'</span></div><div class="cap-preview">«'+esc(pv)+'…»</div></div></div><div class="cap-exp" id="ce'+i+'">'+fotoExpandHtml+'<div class="cap-full">'+esc(c.contenido||'')+'</div><div class="cap-actions-primary"><a class="act-btn act-cert" href="/certificado.html?id='+c.id+'" target="_blank">📜 Certificado PDF</a><button class="act-btn '+toggleClass+'" onclick="togglePublica(\''+c.id+'\','+(!c.es_publica)+','+i+')">'+toggleLabel+'</button>'+(publicLink?'<button class="act-btn act-share-public" onclick="copyPublic(\''+publicLink+'\')">🔗 Link público</button>':'')+'<a class="act-btn act-share-public" href="/generador.html" style="background:rgba(212,165,71,.08);color:var(--oro);border-color:var(--linea-2)" target="_blank">🖼 Imagen</a></div><div class="share-row"><button class="shr" onclick="event.stopPropagation();sX('+i+')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>X</button><button class="shr" onclick="event.stopPropagation();sWA('+i+')">WhatsApp</button><button class="shr" onclick="event.stopPropagation();sFB('+i+')">Facebook</button><button class="shr" onclick="event.stopPropagation();sLI('+i+')">LinkedIn</button><button class="shr" onclick="event.stopPropagation();sCopy('+i+')">Copiar</button><button class="shr" onclick="event.stopPropagation();sEmail('+i+')">Email</button></div></div></div>';
}).join('');}

function togCap(i){var e=document.getElementById('ce'+i);if(e)e.classList.toggle('open');}
function setF(f){filt=f;renderFilters();renderCaps();}

async function togglePublica(capsulaId, nuevoValor, idx){
  if(!(UP.plan==='guardian'||UP.plan==='eterno'||UP.es_admin)){
    toast('⚠️ Hacer pública requiere plan Guardián');
    return;
  }
  event.stopPropagation();

  try{
    var sess=await sb.auth.getSession();
    var token=sess.data&&sess.data.session?sess.data.session.access_token:null;
    if(!token){toast('Sesión perdida. Recarga la página.');return;}

    var ctrl=new AbortController();
    var tid=setTimeout(function(){ctrl.abort();},5000);

    var res=await fetch(SB_URL+'/rest/v1/rpc/toggle_capsula_publica',{
      method:'POST',
      headers:{
        'apikey':SB_KEY,
        'Authorization':'Bearer '+token,
        'Content-Type':'application/json',
        'Accept':'application/json'
      },
      body:JSON.stringify({p_capsula_id:capsulaId, p_publica:nuevoValor}),
      signal:ctrl.signal
    });
    clearTimeout(tid);

    if(!res.ok){
      var txt=await res.text();
      console.error('[togglePublica] HTTP',res.status,txt);
      toast('Error: '+res.status);
      return;
    }

    var data=await res.json();
    if(!data||!data.ok){
      toast('Error: '+(data&&data.error||'desconocido'));
      return;
    }

    caps[idx].es_publica=nuevoValor;
    toast(nuevoValor?'✓ Cápsula pública en el Archivo':'🔒 Cápsula privada');
    renderCaps();

    var publicas=caps.filter(function(c){return c.es_publica;}).length;
    var stEl=document.getElementById('stats');
    if(stEl){var stn=stEl.querySelectorAll('.stat-n')[1];if(stn)stn.textContent=publicas;}
  }catch(e){
    console.error('[togglePublica] Excepción:',e);
    if(e.name==='AbortError') toast('Timeout — intenta de nuevo');
    else toast('Error: '+e.message);
  }
}

}

function sFB(i){var c=caps[i];var url=c.es_publica&&c.numero_certificado?'https://thanotectas.com/certificado.html?n='+c.numero_certificado:'https://thanotectas.com';window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(url)+'&quote='+encodeURIComponent(gTxt(i).substring(0,200)),'_blank');}

function sCopy(i){navigator.clipboard.writeText(caps[i].contenido||'').then(function(){toast('Cápsula copiada ✓');});}
function sEmail(i){var c=caps[i];window.open('mailto:?subject='+encodeURIComponent('Cápsula Thanotectas: '+c.sujeto)+'&body='+encodeURIComponent(gTxt(i)));}

function exportAll(){if(caps.length===0){toast('No hay cápsulas');return;}var t='═══════════════════════════════════════\n  THANOTECTAS — Archivo del Umbral\n═══════════════════════════════════════\n\n';caps.forEach(function(c,i){var f=new Date(c.created_at).toLocaleDateString('es-CO');t+='── Cápsula '+(i+1)+' ──────────────────\n'+(c.numero_certificado?'Nº archivo: '+c.numero_certificado+'\n':'')+'Tipo: '+((TM[c.tipo]||{}).lb||c.tipo)+'\nSujeto: '+c.sujeto+'\nIdioma: '+(c.idioma||'es').toUpperCase()+'\nFecha: '+f+'\n\n'+(c.contenido||'')+'\n\n';});t+='═══════════════════════════════════════\nthanotectas.com\n';var b=new Blob([t],{type:'text/plain;charset=utf-8'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='thanotectas-capsulas-'+new Date().toISOString().slice(0,10)+'.txt';a.click();toast('Cápsulas exportadas ✓');}

function goTo(url){window.location.href=url;}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
init();
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js");}</script>
