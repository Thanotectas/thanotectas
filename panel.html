<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a1611">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>Mi Panel — Thanotectas · Guardianes del Umbral</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--tierra:#1a1611;--tierra2:#2a2319;--musgo:#2d4a2e;--musgo-c:#3d6a3e;--musgo-g:#4a8a4b;--ocre:#c4973b;--ocre-c:#d4a74b;--marfil:#f0e6d3;--marfil-t:rgba(240,230,211,.6);--cristal:rgba(240,230,211,.06);--azul:#5a9ec8;--lila:#8b7ec8;--coral:#d08060;--rosa:#c87a9a;--rojo:#c04030}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Jost',sans-serif;background:var(--tierra);color:var(--marfil);min-height:100vh}
.nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.9rem 2rem;background:rgba(26,22,17,.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(196,151,59,.1)}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--ocre);text-decoration:none;letter-spacing:.08em}
.nav-links{display:flex;gap:.5rem;align-items:center}
.nav-links a{font-size:.78rem;color:var(--marfil-t);text-decoration:none;padding:.45rem 1rem;border-radius:6px;transition:all .2s;letter-spacing:.03em}
.nav-links a:hover{color:var(--marfil);background:rgba(240,230,211,.06)}
.nav-links a.on{color:var(--ocre);background:rgba(196,151,59,.1);border:1px solid rgba(196,151,59,.2)}
.nav-links .btn-new{background:linear-gradient(135deg,var(--musgo),var(--musgo-c));color:var(--marfil);font-weight:500;padding:.5rem 1.2rem;border-radius:6px}
.nav-links .btn-new:hover{box-shadow:0 4px 16px rgba(45,74,46,.3)}
.wrap{max-width:860px;margin:0 auto;padding:2rem 1.5rem 5rem}
.loading{text-align:center;padding:6rem 1.5rem;color:var(--marfil-t)}
.spinner{width:28px;height:28px;border:2px solid rgba(196,151,59,.15);border-top-color:var(--ocre);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 1rem}
@keyframes sp{to{transform:rotate(360deg)}}
.welcome{margin-bottom:2rem}
.welcome h1{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:400;margin-bottom:.3rem}
.welcome h1 em{color:var(--ocre);font-style:normal;font-weight:600}
.welcome p{font-size:.85rem;color:var(--marfil-t)}
.prof{display:flex;align-items:center;gap:1rem;padding:1.2rem 1.5rem;background:var(--cristal);border:1px solid rgba(196,151,59,.1);border-radius:12px;margin-bottom:1.5rem}
.prof-av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;background:rgba(196,151,59,.1);border:1px solid rgba(196,151,59,.15)}
.prof-info{flex:1;min-width:0}
.prof-name{font-size:.95rem;font-weight:500;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.prof-email{font-size:.72rem;color:var(--marfil-t)}
.badge{font-size:.55rem;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.badge-gratis{background:rgba(74,138,75,.15);color:var(--musgo-g)}
.badge-explorador{background:rgba(90,158,200,.12);color:var(--azul)}
.badge-guardian{background:rgba(196,151,59,.12);color:var(--ocre)}
.badge-eterno{background:linear-gradient(135deg,rgba(196,151,59,.25),rgba(212,167,75,.2));color:var(--ocre-c);border:1px solid rgba(196,151,59,.3)}
.badge-admin{background:rgba(139,126,200,.12);color:var(--lila)}
.plan-status{font-size:.62rem;color:var(--marfil-t);margin-top:.3rem;letter-spacing:.04em}
.plan-status strong{color:var(--ocre);font-weight:500}
.prof-actions{display:flex;gap:.4rem;flex-shrink:0;flex-wrap:wrap}
.prof-btn{font-size:.68rem;color:var(--ocre);padding:.35rem .7rem;border:1px solid rgba(196,151,59,.2);border-radius:5px;cursor:pointer;background:none;font-family:'Jost',sans-serif;transition:all .2s;text-decoration:none}
.prof-btn:hover{background:rgba(196,151,59,.1)}
.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;margin-bottom:2rem}
.quick a,.quick div{display:flex;flex-direction:column;align-items:center;gap:.4rem;padding:1rem .5rem;background:var(--cristal);border:1px solid rgba(196,151,59,.08);border-radius:10px;cursor:pointer;transition:all .25s;text-decoration:none;color:var(--marfil)}
.quick a:hover,.quick div:hover{border-color:rgba(196,151,59,.25);background:rgba(196,151,59,.06);transform:translateY(-2px)}
.quick .qi{font-size:1.5rem}
.quick .ql{font-size:.7rem;font-weight:500;text-align:center;letter-spacing:.02em}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;margin-bottom:2rem}
.stat{background:var(--cristal);border:1px solid rgba(196,151,59,.08);border-radius:10px;padding:1rem;text-align:center}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;line-height:1}
.stat-n.c1{color:var(--musgo-g)}.stat-n.c2{color:var(--ocre)}.stat-n.c3{color:var(--azul)}.stat-n.c4{color:var(--coral)}
.stat-l{font-size:.62rem;color:var(--marfil-t);margin-top:.3rem;letter-spacing:.06em;text-transform:uppercase}
.sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.sec-h h2{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:400}
.filters{display:flex;gap:.3rem;flex-wrap:wrap}
.fbtn{font-size:.65rem;padding:.3rem .7rem;border-radius:12px;border:1px solid rgba(196,151,59,.12);color:var(--marfil-t);cursor:pointer;background:none;font-family:'Jost',sans-serif;transition:all .15s}
.fbtn:hover{border-color:rgba(196,151,59,.3);color:var(--marfil)}
.fbtn.on{background:rgba(196,151,59,.12);color:var(--ocre);border-color:rgba(196,151,59,.25)}
.caps{display:flex;flex-direction:column;gap:.7rem;margin-bottom:2rem}
.cap{background:var(--cristal);border:1px solid rgba(196,151,59,.08);border-radius:12px;cursor:pointer;transition:all .2s;overflow:hidden}
.cap:hover{border-color:rgba(196,151,59,.2);background:rgba(240,230,211,.04)}
.cap-inner{display:flex;padding:1.1rem 1.3rem;gap:1rem;align-items:flex-start}
.cap-icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cap-icon.t-poema{background:rgba(139,126,200,.12)}.cap-icon.t-dato{background:rgba(90,158,200,.1)}.cap-icon.t-carta{background:rgba(90,158,200,.1)}.cap-icon.t-obituario{background:rgba(208,128,96,.1)}.cap-icon.t-alerta{background:rgba(196,151,59,.1)}.cap-icon.t-ritual{background:rgba(200,122,154,.1)}
.cap-body{flex:1;min-width:0}
.cap-subj{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;margin-bottom:.3rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cap-meta{display:flex;gap:.5rem;align-items:center;margin-bottom:.5rem;flex-wrap:wrap}
.cap-tag{font-size:.52rem;padding:2px 6px;border-radius:4px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.cap-tag.tipo{background:rgba(139,126,200,.12);color:var(--lila)}
.cap-tag.idioma{background:rgba(74,138,75,.12);color:var(--musgo-g)}
.cap-tag.cert{background:rgba(196,151,59,.1);color:var(--ocre);font-family:'Jost',sans-serif;letter-spacing:.08em}
.cap-tag.publica{background:rgba(74,138,75,.15);color:var(--musgo-g)}
.cap-date{font-size:.62rem;color:var(--marfil-t)}
.cap-preview{font-family:'Cormorant Garamond',serif;font-size:.9rem;color:var(--marfil-t);line-height:1.65;font-style:italic;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cap-exp{display:none;padding:0 1.3rem 1.3rem;border-top:1px solid rgba(196,151,59,.08)}
.cap-exp.open{display:block;padding-top:1rem}
.cap-full{font-family:'Cormorant Garamond',serif;font-size:1rem;line-height:1.9;white-space:pre-wrap;margin-bottom:1rem}
.cap-actions-primary{display:flex;gap:.5rem;flex-wrap:wrap;padding-bottom:.8rem;margin-bottom:.8rem;border-bottom:1px dashed rgba(196,151,59,.15)}
.act-btn{font-size:.74rem;padding:.5rem 1rem;border-radius:6px;cursor:pointer;font-family:'Jost',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
.act-cert{background:linear-gradient(135deg,rgba(196,151,59,.18),rgba(212,167,75,.12));color:var(--ocre-c);border:1px solid rgba(196,151,59,.35);font-weight:500}
.act-cert:hover{background:linear-gradient(135deg,rgba(196,151,59,.3),rgba(212,167,75,.2));transform:translateY(-1px)}
.act-toggle{background:rgba(74,138,75,.08);color:var(--musgo-g);border:1px solid rgba(74,138,75,.25)}
.act-toggle:hover{background:rgba(74,138,75,.15)}
.act-toggle.active{background:rgba(74,138,75,.2);color:var(--musgo-g);border-color:var(--musgo-g)}
.act-toggle.locked{opacity:.55;cursor:not-allowed}
.act-share-public{background:rgba(90,158,200,.08);color:var(--azul);border:1px solid rgba(90,158,200,.25)}
.act-share-public:hover{background:rgba(90,158,200,.15)}
.share-row{display:flex;gap:.4rem;flex-wrap:wrap}
.shr{font-size:.68rem;padding:.4rem .75rem;border-radius:5px;border:1px solid rgba(196,151,59,.15);background:rgba(196,151,59,.04);color:var(--ocre);cursor:pointer;font-family:'Jost',sans-serif;transition:all .15s;display:flex;align-items:center;gap:4px}
.shr:hover{background:rgba(196,151,59,.12);border-color:rgba(196,151,59,.3)}
.shr svg{width:12px;height:12px}
.publicprofile{background:var(--cristal);border:1px solid rgba(196,151,59,.1);border-radius:12px;padding:1rem 1.3rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap}
.publicprofile-info{flex:1;min-width:0}
.publicprofile-label{font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ocre);margin-bottom:.25rem}
.publicprofile-url{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--marfil);word-break:break-all}
.publicprofile-btn{font-size:.72rem;padding:.5rem 1rem;background:rgba(196,151,59,.1);color:var(--ocre);border:1px solid rgba(196,151,59,.25);border-radius:6px;cursor:pointer;font-family:'Jost',sans-serif;text-decoration:none;white-space:nowrap}
.publicprofile-btn:hover{background:rgba(196,151,59,.2)}
.ref{background:var(--cristal);border:1px solid rgba(196,151,59,.1);border-radius:12px;padding:1.3rem 1.5rem;margin-bottom:2rem}
.ref-head{display:flex;align-items:center;gap:.8rem;margin-bottom:.8rem}
.ref-head span{font-size:1.5rem}
.ref-head h3{font-size:.9rem;font-weight:500}
.ref p{font-size:.78rem;color:var(--marfil-t);margin-bottom:.8rem}
.ref strong{color:var(--ocre)}
.ref-row{display:flex;gap:.4rem;margin-bottom:.6rem}
.ref-in{flex:1;background:rgba(13,11,8,.5);border:1px solid rgba(196,151,59,.12);color:var(--marfil);padding:.55rem .8rem;border-radius:5px;font-size:.75rem;font-family:'Jost',sans-serif}
.ref-in:focus{outline:none;border-color:var(--ocre)}
.ref-btn{background:rgba(196,151,59,.1);color:var(--ocre);border:1px solid rgba(196,151,59,.2);padding:.55rem 1rem;border-radius:5px;cursor:pointer;font-size:.72rem;font-weight:500;font-family:'Jost',sans-serif;transition:all .2s;white-space:nowrap}
.ref-btn:hover{background:rgba(196,151,59,.2)}
.ref-stats{font-size:.68rem;color:var(--marfil-t);display:flex;gap:1.2rem}
.ref-stats strong{color:var(--ocre)}
.empty{text-align:center;padding:3rem 1.5rem;background:var(--cristal);border:1px dashed rgba(196,151,59,.12);border-radius:12px}
.empty .ei{font-size:2.5rem;margin-bottom:.8rem}
.empty h3{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:400;margin-bottom:.4rem}
.empty p{font-size:.8rem;color:var(--marfil-t);margin-bottom:1rem}
.empty .btn-go{display:inline-block;padding:.55rem 1.5rem;background:linear-gradient(135deg,var(--musgo),var(--musgo-c));color:var(--marfil);border-radius:6px;text-decoration:none;font-size:.82rem;font-weight:500}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ocre);color:var(--tierra);padding:.7rem 1.5rem;border-radius:6px;font-size:.82rem;font-weight:500;opacity:0;transition:all .3s;z-index:300;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:600px){.wrap{padding:1.2rem 1rem 4rem}.nav{padding:.7rem 1rem}.nav-links a{font-size:.68rem;padding:.35rem .6rem}.welcome h1{font-size:1.5rem}.prof{flex-wrap:wrap}.prof-actions{width:100%}.quick,.stats{grid-template-columns:repeat(2,1fr)}.cap-inner{padding:.9rem 1rem}.ref-row{flex-direction:column}}
</style>
</head>
<body>
<nav class="nav">
    <a href="/" class="nav-logo">THANOTECTAS</a>
    <div class="nav-links">
        <a class="on">📋 Panel</a>
        <a href="#" onclick="goTo('/oraculo.html');return false">🔮 Oráculo</a>
        <a href="#" onclick="goTo('/cuenta.html');return false">⚙️ Cuenta</a>
        <a class="btn-new" href="#" onclick="goTo('/oraculo.html');return false">✦ Inscribir</a>
    </div>
</nav>
<div class="wrap" id="v-load"><div class="loading"><div class="spinner"></div>Conectando con el Umbral...</div></div>
<div class="wrap" id="v-auth" style="display:none"><div class="loading"><h2 style="font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--ocre);margin-bottom:.6rem">Inicia sesión</h2><p style="color:var(--marfil-t);margin-bottom:1.5rem">Necesitas una cuenta para ver tu panel.</p><a href="#" onclick="goTo('/oraculo.html');return false" style="display:inline-block;padding:.6rem 2rem;background:linear-gradient(135deg,var(--musgo),var(--musgo-c));color:var(--marfil);border-radius:6px;text-decoration:none;font-weight:500">Ir al Oráculo</a></div></div>
<div class="wrap" id="v-panel" style="display:none">
    <div class="welcome" id="welcome"></div>
    <div class="prof" id="prof"></div>
    <div class="publicprofile" id="publicprofile" style="display:none"></div>
    <div class="quick">
        <a href="#" onclick="goTo('/oraculo.html');return false"><span class="qi">✦</span><span class="ql">Inscribir memoria</span></a>
        <a href="#" onclick="goTo('/cuenta.html');return false"><span class="qi">⚙️</span><span class="ql">Mi cuenta</span></a>
        <div onclick="exportAll()"><span class="qi">📥</span><span class="ql">Exportar</span></div>
        <div onclick="shareRefLink()"><span class="qi">🎁</span><span class="ql">Invitar amigos</span></div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="sec-h"><h2>Mis cápsulas</h2><div class="filters" id="filters"></div></div>
    <div class="caps" id="caps"></div>
    <div class="ref" id="ref-card"></div>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var SB_URL='https://oygwnmfwfxbxdogaqwmi.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95Z3dubWZ3ZnhieGRvZ2Fxd21pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1Njc3NzEsImV4cCI6MjA5MTE0Mzc3MX0.RqnATwitqlTWThw27qw4Z2TlHiQBEVpvsKfbBe0kJ8I';
var sb=window.supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:false,storageKey:'sb-thanotectas-auth'}});
var CU=null,UP=null,caps=[],filt='todas';
var TM={poema:{icon:'✍️',css:'t-poema',lb:'Poema'},dato:{icon:'📊',css:'t-dato',lb:'Dato'},carta:{icon:'✉️',css:'t-carta',lb:'Carta'},obituario:{icon:'🕯️',css:'t-obituario',lb:'Obituario'},alerta:{icon:'⚠️',css:'t-alerta',lb:'Alerta'},ritual:{icon:'🪻',css:'t-ritual',lb:'Ritual'}};
var PM={gratis:{e:'🌱',lb:'Gratis',mx:3},explorador:{e:'🌿',lb:'Explorador',mx:10},guardian:{e:'🛡️',lb:'Guardián',mx:20},eterno:{e:'✦',lb:'Eterno',mx:999999},admin:{e:'⚡',lb:'Admin',mx:999999}};

async function init(){try{var r=await sb.auth.getSession();if(!r.data.session){sh('v-auth');return;}CU=r.data.session.user;var p=await sb.from('guardianes').select('*').eq('auth_id',CU.id).single();if(!p.data){await wt(2000);p=await sb.from('guardianes').select('*').eq('auth_id',CU.id).single();}if(!p.data){sh('v-auth');return;}UP=p.data;var c=await sb.from('capsulas').select('*').eq('guardian_id',UP.id).order('created_at',{ascending:false});caps=c.data||[];render();}catch(e){console.error(e);sh('v-auth');}}
function sh(id){document.getElementById('v-load').style.display='none';document.getElementById('v-auth').style.display=id==='v-auth'?'':'none';document.getElementById('v-panel').style.display=id==='v-panel'?'':'none';}
function wt(ms){return new Promise(function(ok){setTimeout(ok,ms)});}

function planStatusText(){
  if(UP.es_admin) return '✦ Administrador · acceso ilimitado';
  if(UP.plan==='eterno') return '✦ <strong>Guardián Eterno</strong> · membresía vitalicia';
  if(UP.plan==='guardian'&&UP.plan_vence_en){
    var d=Math.max(0,Math.ceil((new Date(UP.plan_vence_en)-new Date())/86400000));
    return '<strong>Membresía activa</strong> · '+d+' días restantes';
  }
  if(UP.plan==='guardian') return '<strong>Guardián</strong> · membresía activa';
  if(UP.plan==='explorador') return 'Plan <strong>Explorador</strong>';
  return 'Plan <strong>Gratuito</strong> · <a href="#" onclick="goTo(\'/oraculo.html\');return false" style="color:var(--ocre)">hacerse Guardián →</a>';
}

function render(){sh('v-panel');
var plan=UP.plan||'gratis',pc=PM[plan]||PM.gratis,name=UP.nombre||CU.email.split('@')[0],av=UP.avatar||pc.e,cred=UP.consultas_disponibles||0;
var h=new Date().getHours(),g=h<12?'Buenos días':h<18?'Buenas tardes':'Buenas noches';
document.getElementById('welcome').innerHTML='<h1>'+g+', <em>'+esc(name)+'</em></h1><p>Tu archivo de memorias ecológicas en el Umbral</p>';

document.getElementById('prof').innerHTML='<div class="prof-av">'+av+'</div><div class="prof-info"><div class="prof-name">'+esc(name)+' <span class="badge badge-'+plan+'">'+pc.lb+'</span></div><div class="prof-email">'+esc(CU.email)+'</div><div class="plan-status">'+planStatusText()+'</div></div><div class="prof-actions"><a class="prof-btn" href="#" onclick="goTo(\'/cuenta.html\');return false">⚙️ Cuenta</a></div>';

// Tarjeta de perfil público
if(UP.slug && UP.perfil_publico){
  var publicUrl='https://thanotectas.com/g/'+UP.slug;
  document.getElementById('publicprofile').style.display='flex';
  document.getElementById('publicprofile').innerHTML='<div class="publicprofile-info"><div class="publicprofile-label">🌐 Tu perfil público como Guardián</div><div class="publicprofile-url">'+publicUrl+'</div></div><a class="publicprofile-btn" href="/g/'+UP.slug+'" target="_blank">Ver perfil →</a><button class="publicprofile-btn" onclick="copyPublic(\''+publicUrl+'\')">Copiar link</button>';
}

var tipos={};caps.forEach(function(c){tipos[c.tipo]=1;});
var publicas=caps.filter(function(c){return c.es_publica;}).length;
document.getElementById('stats').innerHTML='<div class="stat"><div class="stat-n c1">'+caps.length+'</div><div class="stat-l">Cápsulas</div></div><div class="stat"><div class="stat-n c2">'+publicas+'</div><div class="stat-l">Públicas</div></div><div class="stat"><div class="stat-n c3">'+Object.keys(tipos).length+'</div><div class="stat-l">Tipos</div></div><div class="stat"><div class="stat-n c4">'+(UP.es_admin?'∞':cred)+'</div><div class="stat-l">Créditos</div></div>';

var code=UP.codigo_referido||CU.id.substring(0,8).toUpperCase(),link='https://thanotectas.com/bienvenida.html?ref='+code,ex=UP.referidos_exitosos||0;
document.getElementById('ref-card').innerHTML='<div class="ref-head"><span>🎁</span><h3>Invita y gana 2 cápsulas gratis</h3></div><p>Comparte tu enlace. Cuando alguien se registre, <strong>ambos reciben 2 consultas extra</strong>.</p><div class="ref-row"><input class="ref-in" id="ref-link" value="'+link+'" readonly onclick="this.select()"><button class="ref-btn" onclick="copyRef()">Copiar</button><button class="ref-btn" onclick="shareRefLink()">Compartir</button></div><div class="ref-stats"><span>Referidos: <strong>'+ex+'</strong></span><span>Ganadas: <strong>'+(ex*2)+'</strong></span></div>';

renderFilters();renderCaps();}

function renderFilters(){var ts=[],seen={};caps.forEach(function(c){if(!seen[c.tipo]){seen[c.tipo]=1;ts.push(c.tipo);}});var h='<button class="fbtn '+(filt==='todas'?'on':'')+'" onclick="setF(\'todas\')">Todas</button><button class="fbtn '+(filt==='publicas'?'on':'')+'" onclick="setF(\'publicas\')">✦ Públicas</button>';ts.forEach(function(t){var tc=TM[t]||{lb:t};h+='<button class="fbtn '+(filt===t?'on':'')+'" onclick="setF(\''+t+'\')">'+tc.lb+'</button>';});document.getElementById('filters').innerHTML=h;}

function renderCaps(){
var list;
if(filt==='todas') list=caps;
else if(filt==='publicas') list=caps.filter(function(c){return c.es_publica;});
else list=caps.filter(function(c){return c.tipo===filt;});

var el=document.getElementById('caps');
if(list.length===0){el.innerHTML='<div class="empty"><div class="ei">🌍</div><h3>'+(caps.length===0?'Aún no tienes cápsulas':'Sin cápsulas en este filtro')+'</h3><p>'+(caps.length===0?'Visita el Oráculo para inscribir tu primera memoria.':'Prueba otro filtro.')+'</p><a class="btn-go" href="#" onclick="goTo(\'/oraculo.html\');return false">Ir al Oráculo</a></div>';return;}

el.innerHTML=list.map(function(c,i){
var tc=TM[c.tipo]||{icon:'📝',css:'t-poema',lb:c.tipo};
var f=new Date(c.created_at).toLocaleDateString('es-CO',{day:'numeric',month:'short',year:'numeric'});
var pv=(c.contenido||'').substring(0,200);
var puedeHacerPublica=(UP.plan==='guardian'||UP.plan==='eterno'||UP.es_admin);
var toggleLabel=c.es_publica?'✓ Pública en el archivo':(puedeHacerPublica?'🔒 Hacer pública':'🔒 Requiere plan Guardián');
var toggleClass=c.es_publica?'act-toggle active':(puedeHacerPublica?'act-toggle':'act-toggle locked');
var publicLink=c.es_publica&&c.numero_certificado?'https://thanotectas.com/certificado.html?n='+c.numero_certificado:'';

return '<div class="cap"><div class="cap-inner" onclick="togCap('+i+')"><div class="cap-icon '+tc.css+'">'+tc.icon+'</div><div class="cap-body"><div class="cap-subj">'+esc(c.sujeto||'Sin título')+'</div><div class="cap-meta">'+(c.numero_certificado?'<span class="cap-tag cert">'+esc(c.numero_certificado)+'</span>':'')+'<span class="cap-tag tipo">'+tc.lb+'</span><span class="cap-tag idioma">'+(c.idioma||'ES').toUpperCase()+'</span>'+(c.es_publica?'<span class="cap-tag publica">✦ Pública</span>':'')+'<span class="cap-date">'+f+'</span></div><div class="cap-preview">«'+esc(pv)+'...»</div></div></div><div class="cap-exp" id="ce'+i+'"><div class="cap-full">'+esc(c.contenido||'')+'</div><div class="cap-actions-primary"><a class="act-btn act-cert" href="/certificado.html?id='+c.id+'" target="_blank">📜 Descargar Certificado PDF</a><button class="act-btn '+toggleClass+'" onclick="togglePublica(\''+c.id+'\','+(!c.es_publica)+','+i+')">'+toggleLabel+'</button>'+(publicLink?'<button class="act-btn act-share-public" onclick="copyPublic(\''+publicLink+'\')">🔗 Copiar link público</button>':'')+'</div><div class="share-row"><button class="shr" onclick="event.stopPropagation();sX('+i+')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>X</button><button class="shr" onclick="event.stopPropagation();sWA('+i+')">💬 WhatsApp</button><button class="shr" onclick="event.stopPropagation();sFB('+i+')">📘 Facebook</button><button class="shr" onclick="event.stopPropagation();sLI('+i+')">💼 LinkedIn</button><button class="shr" onclick="event.stopPropagation();sCopy('+i+')">📋 Copiar</button><button class="shr" onclick="event.stopPropagation();sEmail('+i+')">📧 Email</button></div></div></div>';
}).join('');}

function togCap(i){var e=document.getElementById('ce'+i);if(e)e.classList.toggle('open');}
function setF(f){filt=f;renderFilters();renderCaps();}

async function togglePublica(capsulaId, nuevoValor, idx){
  if(!(UP.plan==='guardian'||UP.plan==='eterno'||UP.es_admin)){
    toast('⚠️ Hacer pública una cápsula requiere plan Guardián');
    return;
  }
  event.stopPropagation();
  var r=await sb.from('capsulas').update({es_publica:nuevoValor}).eq('id',capsulaId).select().single();
  if(r.error){toast('Error: '+r.error.message);return;}
  caps[idx].es_publica=nuevoValor;
  toast(nuevoValor?'✓ Cápsula pública en el archivo':'🔒 Cápsula privada');
  renderCaps();
  // actualizar stats
  var publicas=caps.filter(function(c){return c.es_publica;}).length;
  var stEl=document.getElementById('stats');
  if(stEl){var stn=stEl.querySelectorAll('.stat-n')[1];if(stn)stn.textContent=publicas;}
}

function copyPublic(url){navigator.clipboard.writeText(url).then(function(){toast('🔗 Link público copiado');});}
function copyRef(){navigator.clipboard.writeText(document.getElementById('ref-link').value).then(function(){toast('Enlace copiado ✓');});}

function shareRefLink(){
  var code=UP?UP.codigo_referido||CU.id.substring(0,8).toUpperCase():'';
  var url='https://thanotectas.com/bienvenida.html?ref='+encodeURIComponent(code);
  var texto='🌿 Te invito a Thanotectas — Guardianes del Umbral\n\nHonra lo que la Tierra está perdiendo. Genera cápsulas de memoria ecológica con inteligencia artificial.\n\n✦ Nos regalan 2 cápsulas extra a los dos:\n'+url;
  if(navigator.share){navigator.share({title:'Thanotectas',text:texto,url:url});}
  else{navigator.clipboard.writeText(url).then(function(){toast('Enlace copiado ✓');});}
}

function gTxt(i){var c=caps[i];var tc=TM[c.tipo]||{lb:c.tipo};return tc.lb+': '+c.sujeto+'\n\n'+(c.contenido||'').substring(0,250)+'...\n\n🌍 thanotectas.com';}
function sX(i){var c=caps[i];var url=c.es_publica&&c.numero_certificado?'https://thanotectas.com/certificado.html?n='+c.numero_certificado:'https://thanotectas.com';window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(gTxt(i).substring(0,260))+'&url='+encodeURIComponent(url),'_blank');}
function sWA(i){var c=caps[i];var code=UP?UP.codigo_referido||CU.id.substring(0,8).toUpperCase():'';var url=c.es_publica&&c.numero_certificado?'https://thanotectas.com/certificado.html?n='+c.numero_certificado:'https://thanotectas.com/bienvenida.html?ref='+encodeURIComponent(code)+'&sujeto='+encodeURIComponent(c.sujeto||'')+'&tipo='+encodeURIComponent(c.tipo||'');var tc=TM[c.tipo]||{lb:c.tipo};var texto=tc.lb+': '+(c.sujeto||'')+'\n\n'+(c.contenido||'').substring(0,200)+'...\n\n🌍 '+url;window.open('https://wa.me/?text='+encodeURIComponent(texto),'_blank');}
function sFB(i){var c=caps[i];var url=c.es_publica&&c.numero_certificado?'https://thanotectas.com/certificado.html?n='+c.numero_certificado:'https://thanotectas.com';window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(url)+'&quote='+encodeURIComponent(gTxt(i).substring(0,200)),'_blank');}
function sLI(i){var c=caps[i];var url=c.es_publica&&c.numero_certificado?'https://thanotectas.com/certificado.html?n='+c.numero_certificado:'https://thanotectas.com';window.open('https://www.linkedin.com/sharing/share-offsite/?url='+encodeURIComponent(url),'_blank');}
function sCopy(i){navigator.clipboard.writeText(caps[i].contenido||'').then(function(){toast('Cápsula copiada ✓');});}
function sEmail(i){var c=caps[i];window.open('mailto:?subject='+encodeURIComponent('Cápsula Thanotectas: '+c.sujeto)+'&body='+encodeURIComponent(gTxt(i)));}

function exportAll(){if(caps.length===0){toast('No hay cápsulas');return;}var t='═══════════════════════════════════════\n  THANOTECTAS — Guardianes del Umbral\n═══════════════════════════════════════\n\n';caps.forEach(function(c,i){var f=new Date(c.created_at).toLocaleDateString('es-CO');t+='── Cápsula '+(i+1)+' ──────────────────\n'+(c.numero_certificado?'Nº archivo: '+c.numero_certificado+'\n':'')+'Tipo: '+((TM[c.tipo]||{}).lb||c.tipo)+'\nSujeto: '+c.sujeto+'\nIdioma: '+(c.idioma||'es').toUpperCase()+'\nFecha: '+f+'\n\n'+(c.contenido||'')+'\n\n';});t+='═══════════════════════════════════════\nthanotectas.com\n';var b=new Blob([t],{type:'text/plain;charset=utf-8'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='thanotectas-capsulas-'+new Date().toISOString().slice(0,10)+'.txt';a.click();toast('Cápsulas exportadas ✓');}

function goTo(url){window.location.href=url;}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
init();
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js");}</script>
</body>
