<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Certificado de Inscripción · Thanotectas</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📜</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root{--verde-bosque:#1A2E1A;--dorado-ambar:#C8922A;--dorado-tenue:#B4832A;--verde-teal:#2E7D6B;--crema-calido:#E8E4D0;--blanco-calido:#F5F0E8;--tinta:#1A2E1A;--tinta-suave:rgba(26,46,26,0.72);--tinta-tenue:rgba(26,46,26,0.45);}
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{background:var(--verde-bosque);color:var(--tinta);font-family:'Jost',sans-serif;min-height:100vh;}
    body::before{content:"";position:fixed;inset:0;background:radial-gradient(1px 1px at 20% 30%, rgba(232,228,208,0.18) 50%, transparent 51%),radial-gradient(1px 1px at 75% 60%, rgba(232,228,208,0.15) 50%, transparent 51%),radial-gradient(1px 1px at 40% 80%, rgba(200,146,42,0.18) 50%, transparent 51%),radial-gradient(1px 1px at 85% 20%, rgba(232,228,208,0.12) 50%, transparent 51%),radial-gradient(2px 2px at 10% 90%, rgba(200,146,42,0.10) 50%, transparent 51%),radial-gradient(circle at 50% 50%, rgba(46,125,107,0.06), transparent 60%);background-size:180px 180px,240px 240px,200px 200px,300px 300px,400px 400px,100% 100%;pointer-events:none;z-index:0;}
    .toolbar{position:sticky;top:0;z-index:10;background:rgba(26,46,26,0.78);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid rgba(200,146,42,0.25);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;gap:12px;color:var(--crema-calido);}
    .toolbar .brand{font-family:'Cormorant Garamond',serif;font-weight:500;font-style:italic;letter-spacing:0.05em;font-size:15px;color:var(--crema-calido);opacity:0.85;}
    .toolbar .actions{display:flex;gap:10px;flex-wrap:wrap;}
    .btn{background:transparent;color:var(--crema-calido);border:1px solid rgba(200,146,42,0.5);padding:10px 18px;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.25s ease;text-decoration:none;display:inline-flex;align-items:center;gap:8px;}
    .btn:hover{background:var(--dorado-ambar);color:var(--verde-bosque);border-color:var(--dorado-ambar);}
    .btn-primary{background:var(--dorado-ambar);color:var(--verde-bosque);border-color:var(--dorado-ambar);}
    .btn-primary:hover{background:var(--crema-calido);border-color:var(--crema-calido);}
    .stage{position:relative;z-index:1;padding:40px 20px 80px;display:flex;justify-content:center;}
    .sheet{width:min(800px,100%);background:var(--blanco-calido);color:var(--tinta);padding:80px 70px 60px;position:relative;box-shadow:0 40px 80px -20px rgba(0,0,0,0.6),0 0 0 1px rgba(200,146,42,0.18);overflow:hidden;}
    .sheet::before{content:"";position:absolute;inset:24px;border:1px solid rgba(200,146,42,0.35);pointer-events:none;}
    .sheet::after{content:"";position:absolute;inset:32px;border:1px solid rgba(26,46,26,0.12);pointer-events:none;}
    .corner{position:absolute;width:36px;height:36px;border:1px solid var(--dorado-ambar);opacity:0.9;pointer-events:none;}
    .corner-tl{top:44px;left:44px;border-right:none;border-bottom:none;}
    .corner-tr{top:44px;right:44px;border-left:none;border-bottom:none;}
    .corner-bl{bottom:44px;left:44px;border-right:none;border-top:none;}
    .corner-br{bottom:44px;right:44px;border-left:none;border-top:none;}
    .sheet-pattern{position:absolute;inset:32px;background-image:radial-gradient(1px 1px at 15% 25%, rgba(26,46,26,0.06) 50%, transparent 51%),radial-gradient(1px 1px at 75% 65%, rgba(200,146,42,0.08) 50%, transparent 51%),radial-gradient(1px 1px at 55% 85%, rgba(46,125,107,0.06) 50%, transparent 51%);background-size:220px 220px,260px 260px,300px 300px;pointer-events:none;opacity:0.8;}
    .content{position:relative;z-index:2;}
    .header{text-align:center;margin-bottom:48px;}
    .tree{width:54px;height:54px;margin:0 auto 16px;display:block;}
    .brand-title{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:28px;letter-spacing:0.35em;color:var(--verde-bosque);margin-bottom:6px;}
    .brand-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;color:var(--verde-teal);font-size:14px;letter-spacing:0.08em;}
    .divider{display:flex;align-items:center;justify-content:center;gap:14px;margin:28px auto;max-width:320px;}
    .divider-line{flex:1;height:1px;background:var(--dorado-ambar);opacity:0.6;}
    .divider-dot{width:5px;height:5px;background:var(--dorado-ambar);transform:rotate(45deg);}
    .cert-title{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:18px;text-transform:uppercase;letter-spacing:0.38em;color:var(--verde-teal);margin-bottom:8px;}
    .cert-subtitle{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;color:var(--tinta-suave);font-size:15px;}
    .formula{text-align:center;margin:40px 0 24px;font-family:'Cormorant Garamond',serif;font-weight:400;font-size:16px;color:var(--tinta-suave);letter-spacing:0.04em;}
    .guardian-name{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:46px;text-align:center;color:var(--verde-bosque);letter-spacing:0.02em;line-height:1.1;margin:12px 0 8px;}
    .guardian-role{text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--dorado-tenue);margin-bottom:36px;letter-spacing:0.12em;}
    .has-inscribed{text-align:center;font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--tinta-suave);letter-spacing:0.04em;margin-bottom:14px;}
    .memoria-wrap{text-align:center;margin:18px 0 32px;}
    .memoria-sujeto{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:36px;color:var(--verde-bosque);letter-spacing:0.06em;line-height:1.2;text-transform:uppercase;margin-bottom:10px;}
    .memoria-meta{display:inline-flex;align-items:center;gap:10px;font-family:'Jost',sans-serif;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.2em;color:var(--verde-teal);}
    .memoria-meta .sep{width:4px;height:4px;background:currentColor;border-radius:50%;opacity:0.5;}
    .contenido{margin:34px auto 42px;max-width:560px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16.5px;line-height:1.75;color:var(--tinta);text-align:center;position:relative;padding:0 28px;}
    .contenido::before,.contenido::after{content:"";position:absolute;width:40px;height:1px;background:var(--dorado-ambar);opacity:0.5;left:50%;transform:translateX(-50%);}
    .contenido::before{top:-16px;} .contenido::after{bottom:-16px;}
    .contenido p{margin-bottom:12px;} .contenido p:last-child{margin-bottom:0;}
    .cierre{margin-top:44px;padding-top:28px;border-top:1px solid rgba(200,146,42,0.35);display:grid;grid-template-columns:1fr auto 1fr;gap:30px;align-items:end;}
    .meta-block{font-family:'Jost',sans-serif;font-size:10.5px;font-weight:500;text-transform:uppercase;letter-spacing:0.18em;color:var(--tinta-tenue);}
    .meta-label{display:block;margin-bottom:6px;font-size:9.5px;opacity:0.7;}
    .meta-value{font-family:'JetBrains Mono',monospace;font-weight:500;font-size:12px;letter-spacing:0.1em;color:var(--verde-bosque);text-transform:none;}
    .meta-value.fecha{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;letter-spacing:0.04em;}
    .seal{width:110px;height:110px;border:1px solid var(--dorado-ambar);border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;background:rgba(200,146,42,0.05);}
    .seal::before{content:"";position:absolute;inset:6px;border:1px dashed rgba(200,146,42,0.5);border-radius:50%;}
    .seal-inner{text-align:center;font-family:'Cormorant Garamond',serif;}
    .seal-inner .t1{display:block;font-size:11px;letter-spacing:0.28em;color:var(--dorado-tenue);text-transform:uppercase;}
    .seal-inner .t2{display:block;font-style:italic;font-size:9px;margin-top:2px;color:var(--verde-teal);letter-spacing:0.04em;}
    .footer{text-align:center;margin-top:40px;padding-top:22px;border-top:1px solid rgba(26,46,26,0.1);font-family:'Jost',sans-serif;font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--tinta-tenue);}
    .footer em{display:block;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;letter-spacing:0.05em;text-transform:none;color:var(--verde-teal);margin-bottom:10px;}
    .state{text-align:center;padding:60px 30px;color:var(--tinta-suave);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;line-height:1.7;}
    .foto-cert{display:block;margin:30px auto 8px;max-width:340px;width:100%;padding:14px 14px 50px;background:#FBF8F0;box-shadow:0 8px 24px rgba(26,46,26,0.18),0 2px 6px rgba(26,46,26,0.12);position:relative;border:1px solid rgba(26,46,26,0.08);}
    .foto-cert img{display:block;width:100%;height:auto;max-height:280px;object-fit:cover;filter:sepia(0.12) contrast(1.02);}
    .foto-cert::after{content:"❦";position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--dorado-tenue);}
    .foto-cert-caption{text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11.5px;color:var(--tinta-tenue);letter-spacing:0.08em;margin-bottom:24px;}
    .state-title{font-style:normal;font-weight:500;font-size:22px;color:var(--verde-bosque);letter-spacing:0.05em;margin-bottom:10px;}
    .state a{color:var(--dorado-tenue);}
    @media (max-width:640px){.sheet{padding:50px 26px 36px;} .sheet::before{inset:14px;} .sheet::after{inset:20px;} .corner{width:22px;height:22px;} .corner-tl{top:26px;left:26px;} .corner-tr{top:26px;right:26px;} .corner-bl{bottom:26px;left:26px;} .corner-br{bottom:26px;right:26px;} .brand-title{font-size:22px;letter-spacing:0.25em;} .cert-title{font-size:14px;letter-spacing:0.28em;} .guardian-name{font-size:30px;} .memoria-sujeto{font-size:24px;} .contenido{font-size:15px;padding:0 8px;} .cierre{grid-template-columns:1fr;gap:20px;text-align:center;} .seal{margin:0 auto;}}
    @media print{@page{size:A4;margin:0;} html,body{background:#fff !important;} body::before,.toolbar{display:none !important;} .stage{padding:0;} .sheet{box-shadow:none;width:100%;min-height:100vh;padding:55px 60px 42px;page-break-after:always;} .sheet::before{inset:18px;} .sheet::after{inset:24px;} .corner-tl{top:30px;left:30px;} .corner-tr{top:30px;right:30px;} .corner-bl{bottom:30px;left:30px;} .corner-br{bottom:30px;right:30px;} .contenido{font-size:14px;} .guardian-name{font-size:38px;} .memoria-sujeto{font-size:30px;}}
  </style>
</head>
<body>
  <div class="toolbar"><div class="brand">Thanotectas · Archivo del Umbral</div><div class="actions"><a href="/panel.html" class="btn">← Volver al Panel</a><button class="btn btn-primary" onclick="window.print()">Descargar PDF</button></div></div>
  <div class="stage"><article class="sheet"><div class="sheet-pattern"></div><span class="corner corner-tl"></span><span class="corner corner-tr"></span><span class="corner corner-bl"></span><span class="corner corner-br"></span><div class="content" id="content"><div class="state"><div class="state-title">Inscribiendo la memoria…</div><div>El Oráculo está recuperando la cápsula.</div></div></div></article></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    var SB_URL='https://oygwnmfwfxbxdogaqwmi.supabase.co';
    var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95Z3dubWZ3ZnhieGRvZ2Fxd21pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1Njc3NzEsImV4cCI6MjA5MTE0Mzc3MX0.RqnATwitqlTWThw27qw4Z2TlHiQBEVpvsKfbBe0kJ8I';
    var sb=window.supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
    var content=document.getElementById('content');
    var TREE_SVG='<svg class="tree" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><g fill="none" stroke="#C8922A" stroke-width="1.4" stroke-linecap="round"><line x1="32" y1="12" x2="32" y2="32"/><line x1="32" y1="16" x2="18" y2="8"/><line x1="32" y1="16" x2="46" y2="8"/><line x1="32" y1="20" x2="14" y2="14"/><line x1="32" y1="20" x2="50" y2="14"/><circle cx="32" cy="22" r="3" fill="#C8922A" stroke="none"/><circle cx="18" cy="8" r="1.2" fill="#C8922A" stroke="none"/><circle cx="46" cy="8" r="1.2" fill="#C8922A" stroke="none"/><circle cx="14" cy="14" r="1" fill="#C8922A" stroke="none"/><circle cx="50" cy="14" r="1" fill="#C8922A" stroke="none"/></g><line x1="16" y1="34" x2="48" y2="34" stroke="#1A2E1A" stroke-width="0.8" opacity="0.4"/><g fill="none" stroke="#2E7D6B" stroke-width="1.4" stroke-linecap="round"><line x1="32" y1="34" x2="32" y2="54"/><line x1="32" y1="44" x2="22" y2="54"/><line x1="32" y1="44" x2="42" y2="54"/></g></svg>';
    function esc(s){return (s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
    function renderCert(cap,gn){var fecha=new Date(cap.created_at).toLocaleDateString('es-CO',{day:'numeric',month:'long',year:'numeric'});var html=esc(cap.contenido||'').split(/\n{2,}/).map(function(p){return '<p>'+p.replace(/\n/g,'<br/>')+'</p>';}).join('');var cat=(cap.categoria||'especies').replace(/^./,function(c){return c.toUpperCase();});var tipo=(cap.tipo||'poema').replace(/^./,function(c){return c.toUpperCase();});var idioma=(cap.idioma||'es').toUpperCase();
    // Foto del usuario: solo mostrar si está alojada en supabase storage (no URLs genéricas de Unsplash o stock)
    var fotoHtml='';
    if(cap.imagen_url && /supabase\.co\/storage\/.*capsulas-imagenes/.test(cap.imagen_url)){
      fotoHtml='<figure class="foto-cert"><img src="'+esc(cap.imagen_url)+'" alt="'+esc(cap.sujeto||'')+'" loading="lazy" /></figure><div class="foto-cert-caption">— Imagen consagrada por el Guardián —</div>';
    }
    content.innerHTML='<header class="header">'+TREE_SVG+'<div class="brand-title">THANOTECTAS</div><div class="brand-sub">Archivo del Umbral</div><div class="divider"><span class="divider-line"></span><span class="divider-dot"></span><span class="divider-line"></span></div><div class="cert-title">Certificado de Inscripción</div><div class="cert-subtitle">al Archivo del Umbral</div></header><div class="formula">Se hace constar que</div><h1 class="guardian-name">'+esc(gn||'Guardián Anónimo')+'</h1><div class="guardian-role">· Guardián del Umbral ·</div><div class="has-inscribed">ha inscrito para la posteridad la memoria de</div><div class="memoria-wrap"><h2 class="memoria-sujeto">'+esc(cap.sujeto||'—')+'</h2><div class="memoria-meta"><span>'+esc(cat)+'</span><span class="sep"></span><span>'+esc(tipo)+'</span><span class="sep"></span><span>'+esc(idioma)+'</span></div></div>'+fotoHtml+'<div class="contenido">'+html+'</div><div class="cierre"><div class="meta-block" style="text-align:left;"><span class="meta-label">Número de archivo</span><span class="meta-value">'+esc(cap.numero_certificado||'—')+'</span></div><div class="seal"><div class="seal-inner"><span class="t1">Fundath</span><span class="t2">2026</span></div></div><div class="meta-block" style="text-align:right;"><span class="meta-label">Fecha de inscripción</span><span class="meta-value fecha">'+fecha+'</span></div></div><div class="footer"><em>"Todo lo que desaparece merece ser recordado."</em>thanotectas.com · Archivo Permanente</div>';}
    function renderErr(t,m){content.innerHTML='<div class="state"><div class="state-title">'+esc(t)+'</div><div>'+esc(m)+'</div><br/><div><a href="/panel.html">← Volver al Panel del Guardián</a></div></div>';}
    async function init(){var p=new URLSearchParams(window.location.search);var id=p.get('id');var n=p.get('n');if(n&&!id){var r=await sb.rpc('obtener_capsula_publica',{numero_param:n});if(r.error||!r.data||r.data.length===0)return renderErr('Cápsula no encontrada','Esta cápsula no es pública o el número no existe.');var c=r.data[0];return renderCert(c,c.guardian_nombre);}if(id){var s=await sb.auth.getSession();if(!s.data.session)return renderErr('Sesión requerida','Inicia sesión para ver tu certificado.');var r2=await sb.from('capsulas').select('id,sujeto,categoria,tipo,idioma,contenido,imagen_url,numero_certificado,created_at,guardian_id').eq('id',id).single();if(r2.error||!r2.data)return renderErr('No pudimos recuperar la cápsula','Es posible que no te pertenezca o haya sido eliminada.');var rg=await sb.from('guardianes').select('nombre,slug').eq('id',r2.data.guardian_id).single();return renderCert(r2.data,rg.data?rg.data.nombre:null);}renderErr('Falta el identificador','Esta URL debería incluir ?id=<uuid> o ?n=TH-2026-00001.');}
    init().catch(function(e){console.error(e);renderErr('Error inesperado',e.message||'Revisa la consola del navegador.');});
  </script>
</body>
</html>
